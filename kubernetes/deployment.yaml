apiVersion: apps/v1
kind: Deployment
metadata:
  name: skynetx-app
  namespace: skynetx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: skynetx-app
  template:
    metadata:
      labels:
        app: skynetx-app
    spec:
      containers:
        - name: skynetx-app
          image: skynetx-app:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: skynetx-config
            - secretRef:
                name: skynetx-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
