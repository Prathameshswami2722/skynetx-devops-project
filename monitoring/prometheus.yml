global:
  scrape_interval: 15s

rule_files:
  - alert-rules.yml

scrape_configs:
  - job_name: "skynetx-app"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "localhost:5000"

  - job_name: "skynetx-kubernetes-service"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "skynetx-service.skynetx.svc.cluster.local:5000"
